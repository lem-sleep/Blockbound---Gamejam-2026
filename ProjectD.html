<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Blockbound</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; font-family: monospace; }
        .crafting-panel {
            position: fixed;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.95);
            border: 2px solid #ffaa44;
            border-radius: 12px;
            padding: 15px;
            color: #ffaa44;
            font-family: monospace;
            z-index: 1000;
            display: none;
            flex-direction: column;
            gap: 12px;
            min-width: 240px;
            backdrop-filter: blur(8px);
            pointer-events: auto;
            max-height: 70vh;
            overflow-y: auto;
        }
        .crafting-panel h3 {
            margin: 0 0 10px 0;
            text-align: center;
            font-size: 18px;
        }
        .crafting-panel .recipe {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #222;
            padding: 8px 12px;
            border-radius: 8px;
            border-left: 3px solid #ffaa44;
        }
        .crafting-panel .recipe-info {
            font-size: 13px;
        }
        .crafting-panel .recipe-info span {
            color: #fff;
        }
        .crafting-panel button {
            background: #446644;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-family: monospace;
            font-size: 12px;
            transition: 0.2s;
        }
        .crafting-panel button:hover {
            background: #66aa66;
        }
        .crafting-panel button:disabled {
            background: #444;
            cursor: not-allowed;
            opacity: 0.6;
        }
        .crafting-panel .close-btn {
            position: absolute;
            top: 8px;
            right: 12px;
            cursor: pointer;
            font-size: 16px;
            color: #aaa;
        }
        .crafting-panel .close-btn:hover {
            color: #fff;
        }
        .controls-hint {
            position: fixed;
            bottom: 12px;
            right: 12px;
            background: rgba(0,0,0,0.7);
            color: #ccc;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 11px;
            z-index: 100;
            pointer-events: none;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
</head>
<body>
<div class="controls-hint">
    🎮 WASD/Arrows = Move | SPACE = Jump | E = Collect Sticks<br>
    📦 ESC = Inventory + Crafting | 1-0 = Hotbar | Scroll = Cycle<br>
    🖱️ Drag & Drop items to rearrange (click and drag, release over slot)
</div>

<div id="craftingPanel" class="crafting-panel">
    <div class="close-btn" onclick="closeCraftPanel()">✖</div>
    <h3>🔨 CRAFTING</h3>
    <div id="recipe-list"></div>
</div>

<script>
// --------------------------------------------------------------
// PHASER CONFIG
// --------------------------------------------------------------
const config = {
    type: Phaser.AUTO,
    width: window.innerWidth,
    height: window.innerHeight,
    backgroundColor: '#6bb5ff',
    physics: {
        default: 'arcade',
        arcade: { gravity: { y: 300 }, debug: false }
    },
    scene: { create: create, update: update }
};

const game = new Phaser.Game(config);

// --------------------------------------------------------------
// GLOBAL DATA
// --------------------------------------------------------------
let hotbar = Array(10).fill(null).map(() => ({ type: null, count: 0 }));
let inventory = Array(20).fill(null).map(() => ({ type: null, count: 0 }));
let selectedSlot = 0;
let menuOpen = false;

let player;
let groundLayer;
let sticks = [];
let trees = [];
let rocks = [];
let worldWidth = 20000;
let groundY;

let hotbarSlots = [];
let hotbarFrame;
let inventorySlots = [];       // now direct scene objects, not in container
let inventoryBackground;       // background rectangle for inventory area
let inventoryTitle;            // text label for inventory
let inventoryBgContainer;      // container for background and title (non-interactive)

let canAttack = true;
let attackTimer = 0;
const REACH = 85;

// Drag state
let dragActive = false;
let dragSource = null;      // { type: 'hotbar'|'inventory', index: number, item: { type, count } }

const recipes = [
    { name: 'Wooden Axe',      icon: '🪓', cost: { stick: 5 },                result: 'wooden_axe',      resultName: 'Wooden Axe' },
    { name: 'Wooden Pickaxe',  icon: '⛏️', cost: { stick: 8 },                result: 'wooden_pickaxe',  resultName: 'Wooden Pickaxe' },
    { name: 'Stone Axe',       icon: '🪓', cost: { wood: 10, stone: 5 },      result: 'stone_axe',       resultName: 'Stone Axe' },
    { name: 'Stone Pickaxe',   icon: '⛏️', cost: { wood: 12, stone: 8 },      result: 'stone_pickaxe',   resultName: 'Stone Pickaxe' },
    { name: 'Stone Sword',     icon: '⚔️', cost: { wood: 8, stone: 4 },       result: 'stone_sword',     resultName: 'Stone Sword' }
];

// --------------------------------------------------------------
// INVENTORY HELPERS
// --------------------------------------------------------------
function addToInventory(type, amount) {
    for (let i = 0; i < hotbar.length; i++) {
        if (hotbar[i] && hotbar[i].type === type) {
            hotbar[i].count += amount;
            updateHotbarUI();
            return;
        }
    }
    for (let i = 0; i < inventory.length; i++) {
        if (inventory[i] && inventory[i].type === type) {
            inventory[i].count += amount;
            if (menuOpen) updateInventoryUI();
            return;
        }
    }
    for (let i = 0; i < hotbar.length; i++) {
        if (hotbar[i].type === null) {
            hotbar[i] = { type: type, count: amount };
            updateHotbarUI();
            return;
        }
    }
    for (let i = 0; i < inventory.length; i++) {
        if (inventory[i].type === null) {
            inventory[i] = { type: type, count: amount };
            if (menuOpen) updateInventoryUI();
            return;
        }
    }
}

function removeFromInventory(type, amount) {
    let remaining = amount;
    for (let i = 0; i < hotbar.length && remaining > 0; i++) {
        if (hotbar[i].type === type && hotbar[i].count > 0) {
            let take = Math.min(hotbar[i].count, remaining);
            hotbar[i].count -= take;
            remaining -= take;
            if (hotbar[i].count === 0) hotbar[i] = { type: null, count: 0 };
        }
    }
    for (let i = 0; i < inventory.length && remaining > 0; i++) {
        if (inventory[i].type === type && inventory[i].count > 0) {
            let take = Math.min(inventory[i].count, remaining);
            inventory[i].count -= take;
            remaining -= take;
            if (inventory[i].count === 0) inventory[i] = { type: null, count: 0 };
        }
    }
    updateHotbarUI();
    if (menuOpen) updateInventoryUI();
}

function hasInInventory(type, amount) {
    let total = 0;
    for (let s of hotbar) if (s.type === type) total += s.count;
    for (let s of inventory) if (s.type === type) total += s.count;
    return total >= amount;
}

function canCraft(recipe) {
    for (let [res, amt] of Object.entries(recipe.cost)) {
        if (!hasInInventory(res, amt)) return false;
    }
    return true;
}

function craftItem(recipe, scene) {
    if (!canCraft(recipe)) {
        scene.showMessage('❌ Missing materials!', 0xff6666);
        return false;
    }
    for (let [res, amt] of Object.entries(recipe.cost)) {
        removeFromInventory(res, amt);
    }
    addToInventory(recipe.result, 1);
    updateInventoryUI();
    updateCraftingPanel();
    scene.showMessage(`✔️ ${recipe.resultName} crafted!`, 0xaaffaa);
    return true;
}

// --------------------------------------------------------------
// HTML CRAFTING PANEL
// --------------------------------------------------------------
function updateCraftingPanel() {
    const container = document.getElementById('recipe-list');
    if (!container) return;
    container.innerHTML = '';
    for (let recipe of recipes) {
        const affordable = canCraft(recipe);
        const costStr = Object.entries(recipe.cost).map(([r,a]) => `${getItemIcon(r)}${a}`).join(' ');
        const div = document.createElement('div');
        div.className = 'recipe';
        div.innerHTML = `
            <div class="recipe-info">
                ${recipe.icon} ${recipe.name}<br>
                <span>${costStr}</span>
            </div>
            <button data-recipe="${recipe.name}" ${affordable ? '' : 'disabled'}>CRAFT</button>
        `;
        container.appendChild(div);
    }
    document.querySelectorAll('#recipe-list button').forEach(btn => {
        btn.addEventListener('click', (e) => {
            const recipeName = btn.getAttribute('data-recipe');
            const recipe = recipes.find(r => r.name === recipeName);
            if (recipe && canCraft(recipe)) {
                const scene = game.scene.scenes[0];
                craftItem(recipe, scene);
            }
        });
    });
}

function openCraftPanel() {
    updateCraftingPanel();
    document.getElementById('craftingPanel').style.display = 'flex';
}

function closeCraftPanel() {
    document.getElementById('craftingPanel').style.display = 'none';
}

// --------------------------------------------------------------
// DRAG & DROP (using screen coordinates)
// --------------------------------------------------------------
function startDrag(sourceType, index, item) {
    if (!item || !item.type) return;
    dragActive = true;
    dragSource = { type: sourceType, index: index, item: { type: item.type, count: item.count } };
    // Visual feedback
    if (sourceType === 'hotbar') {
        hotbarSlots[index].bg.setAlpha(0.5);
    } else {
        inventorySlots[index].bg.setAlpha(0.5);
    }
}

function cancelDrag() {
    if (dragActive && dragSource) {
        if (dragSource.type === 'hotbar') {
            hotbarSlots[dragSource.index].bg.setAlpha(1);
        } else if (dragSource.type === 'inventory') {
            inventorySlots[dragSource.index].bg.setAlpha(1);
        }
    }
    dragActive = false;
    dragSource = null;
}

function finishDrag(targetType, targetIndex) {
    if (!dragActive || !dragSource) return;

    // restore source alpha
    if (dragSource.type === 'hotbar') {
        hotbarSlots[dragSource.index].bg.setAlpha(1);
    } else {
        inventorySlots[dragSource.index].bg.setAlpha(1);
    }

    // swap
    const sourceArray = dragSource.type === 'hotbar' ? hotbar : inventory;
    const targetArray = targetType === 'hotbar' ? hotbar : inventory;
    const sourceItem = sourceArray[dragSource.index];
    const targetItem = targetArray[targetIndex];

    sourceArray[dragSource.index] = targetItem ? { ...targetItem } : { type: null, count: 0 };
    targetArray[targetIndex] = dragSource.item ? { ...dragSource.item } : { type: null, count: 0 };

    updateHotbarUI();
    if (menuOpen) updateInventoryUI();

    dragActive = false;
    dragSource = null;
}

// --------------------------------------------------------------
// CREATE SCENE
// --------------------------------------------------------------
function create() {
    groundY = this.game.config.height - 55;

    // World generation
    groundLayer = this.physics.add.staticGroup();
    for (let x = -500; x < worldWidth + 500; x += 50) {
        let block = this.add.rectangle(x, groundY, 50, 50, 0x8B5A2B);
        groundLayer.add(block);
    }

    let spawnX = worldWidth / 2;
    player = this.add.rectangle(spawnX, groundY - 45, 28, 28, 0x6fbf4c);
    this.physics.add.existing(player);
    player.body.setCollideWorldBounds(true);
    player.body.setGravityY(300);
    this.physics.add.collider(player, groundLayer);
    this.physics.world.setBounds(0, 0, worldWidth, this.game.config.height);

    // Sticks
    for (let i = 0; i < 80; i++) {
        let x = 800 + Math.random() * (worldWidth - 1600);
        let stick = this.add.rectangle(x, groundY - 14, 12, 12, 0xC97E3A);
        this.physics.add.existing(stick);
        stick.body.setImmovable(true);
        stick.body.setAllowGravity(false);
        sticks.push(stick);
    }

    // Trees
    for (let i = 0; i < 90; i++) {
        let x = 800 + Math.random() * (worldWidth - 1600);
        let trunk = this.add.rectangle(x, groundY - 45, 26, 55, 0x8B5A2B);
        this.physics.add.existing(trunk);
        trunk.body.setImmovable(true);
        trunk.body.setAllowGravity(false);
        let leaves = this.add.rectangle(x, groundY - 75, 48, 42, 0x5A9E4E);
        this.physics.add.existing(leaves);
        leaves.body.setImmovable(true);
        leaves.body.setAllowGravity(false);
        trunk.treeHealth = 3;
        trunk.woodAmount = 5;
        trunk.leavesObj = leaves;
        trees.push(trunk);
    }

    // Rocks
    for (let i = 0; i < 55; i++) {
        let x = 800 + Math.random() * (worldWidth - 1600);
        let rock = this.add.rectangle(x, groundY - 28, 34, 28, 0x888888);
        this.physics.add.existing(rock);
        rock.body.setImmovable(true);
        rock.body.setAllowGravity(false);
        rock.rockHealth = 5;
        rocks.push(rock);
    }

    // Build UI (hotbar and inventory slots directly on scene)
    buildHotbar.call(this);
    buildInventorySlots.call(this);   // inventory slots as direct scene objects

    // Background for inventory area (non-interactive, just visual)
    const hotbarBottom = 16 + 44 + 12;
    const invCols = 10, invRows = 2;
    const slotW = 44, pad = 5;
    const totalWidth = invCols * slotW + (invCols-1)*pad + 30;
    const inventoryHeight = invRows * slotW + (invRows-1)*pad + 30;
    const totalHeight = inventoryHeight + 20;
    inventoryBackground = this.add.rectangle(16 + totalWidth/2, hotbarBottom + totalHeight/2, totalWidth, totalHeight, 0x0a0a0a, 0.96)
        .setScrollFactor(0).setDepth(9);
    inventoryBackground.setStrokeStyle(2, 0xffaa44);
    inventoryTitle = this.add.text(16+10, hotbarBottom+5, '📦 INVENTORY', { fontSize: '14px', fill: '#ffaa44' })
        .setScrollFactor(0).setDepth(9);
    
    // Hide inventory UI initially
    setInventoryVisible(false);

    // Global pointerup for drag & drop
    this.input.on('pointerup', (pointer) => {
        if (!menuOpen) {
            cancelDrag();
            return;
        }
        if (!dragActive) return;

        const screenX = pointer.x;
        const screenY = pointer.y;

        let targetType = null;
        let targetIndex = -1;

        // Check hotbar slots
        for (let i = 0; i < hotbarSlots.length; i++) {
            const bounds = hotbarSlots[i].bg.getBounds();
            if (screenX >= bounds.left && screenX <= bounds.right &&
                screenY >= bounds.top && screenY <= bounds.bottom) {
                targetType = 'hotbar';
                targetIndex = i;
                break;
            }
        }
        // Check inventory slots (only if menu open)
        if (targetType === null && menuOpen) {
            for (let i = 0; i < inventorySlots.length; i++) {
                const bounds = inventorySlots[i].bg.getBounds();
                if (screenX >= bounds.left && screenX <= bounds.right &&
                    screenY >= bounds.top && screenY <= bounds.bottom) {
                    targetType = 'inventory';
                    targetIndex = inventorySlots[i].index;
                    break;
                }
            }
        }

        if (targetType !== null && targetIndex !== -1) {
            finishDrag(targetType, targetIndex);
        } else {
            cancelDrag();
        }
    });

    // Controls
    this.cursors = this.input.keyboard.addKeys({
        left:    Phaser.Input.Keyboard.KeyCodes.A,
        right:   Phaser.Input.Keyboard.KeyCodes.D,
        leftArrow:  Phaser.Input.Keyboard.KeyCodes.LEFT,
        rightArrow: Phaser.Input.Keyboard.KeyCodes.RIGHT,
        jump:    Phaser.Input.Keyboard.KeyCodes.SPACE,
        upArrow: Phaser.Input.Keyboard.KeyCodes.UP,
        interact: Phaser.Input.Keyboard.KeyCodes.E
    });

    // Hotbar keys
    for (let i = 1; i <= 9; i++) {
        this.input.keyboard.on(`keydown-${i}`, () => { if (!menuOpen) { selectedSlot = i-1; updateHotbarUI(); } });
    }
    this.input.keyboard.on('keydown-ZERO', () => { if (!menuOpen) { selectedSlot = 9; updateHotbarUI(); } });
    window.addEventListener('keydown', (e) => {
        if (menuOpen) return;
        const key = e.key;
        if (key >= '1' && key <= '9') {
            selectedSlot = parseInt(key) - 1;
            updateHotbarUI();
            e.preventDefault();
        } else if (key === '0') {
            selectedSlot = 9;
            updateHotbarUI();
            e.preventDefault();
        }
    });

    this.input.on('wheel', (pointer, objs, deltaX, deltaY) => {
        if (!menuOpen) {
            if (deltaY > 0) selectedSlot = (selectedSlot + 1) % 10;
            else selectedSlot = (selectedSlot - 1 + 10) % 10;
            updateHotbarUI();
        }
    });

    this.input.keyboard.on('keydown-ESC', () => {
        menuOpen = !menuOpen;
        setInventoryVisible(menuOpen);
        if (menuOpen) {
            updateInventoryUI();
            openCraftPanel();
        } else {
            closeCraftPanel();
            cancelDrag();
        }
    });

    this.input.keyboard.on('keydown-E', () => {
        if (menuOpen) return;
        for (let i = sticks.length-1; i >= 0; i--) {
            let stick = sticks[i];
            let dist = Phaser.Math.Distance.Between(player.x, player.y, stick.x, stick.y);
            if (dist < REACH) {
                stick.destroy();
                sticks.splice(i,1);
                addToInventory('stick', 1);
                this.showMessage('🌿 +1 Stick', 0xCD853F);
            }
        }
    });

    this.showMessage = function(msg, color) {
        let text = this.add.text(player.x, player.y-45, msg, {
            fontSize: '18px', fill: '#'+color.toString(16), stroke: '#000', strokeThickness: 2, fontFamily: 'monospace'
        }).setOrigin(0.5).setDepth(50);
        this.tweens.add({
            targets: text, y: text.y-45, alpha: 0, duration: 900,
            onComplete: () => text.destroy()
        });
    };

    // Give starting sticks for testing
    addToInventory('stick', 20);
    updateHotbarUI();
}

function setInventoryVisible(visible) {
    inventoryBackground.setVisible(visible);
    inventoryTitle.setVisible(visible);
    for (let slot of inventorySlots) {
        slot.bg.setVisible(visible);
        slot.icon.setVisible(visible);
        slot.countTxt.setVisible(visible);
    }
}

// --------------------------------------------------------------
// HOTBAR
// --------------------------------------------------------------
function buildHotbar() {
    const slotW = 44, slotH = 44, pad = 5;
    const startX = 16, startY = 16;
    const totalW = 10 * slotW + 9 * pad;
    hotbarSlots = [];

    this.add.rectangle(startX + totalW/2, startY + slotH/2, totalW + 18, slotH + 14, 0x000000, 0.8)
        .setScrollFactor(0).setDepth(9);

    for (let i = 0; i < 10; i++) {
        let x = startX + i * (slotW + pad);
        let y = startY;
        let bg = this.add.rectangle(x + slotW/2, y + slotH/2, slotW, slotH, 0x333333)
            .setScrollFactor(0).setDepth(10);
        bg.setStrokeStyle(1, 0x777777);
        let icon = this.add.text(x + slotW/2, y + slotH/2, '', { fontSize: '28px' })
            .setOrigin(0.5).setScrollFactor(0).setDepth(11);
        let countTxt = this.add.text(x + slotW - 6, y + slotH - 6, '', {
            fontSize: '12px', fill: '#fff', fontFamily: 'monospace'
        }).setOrigin(1,1).setScrollFactor(0).setDepth(12);
        let keyTxt = this.add.text(x + 5, y + slotH - 6, i===9?'0':(i+1).toString(), {
            fontSize: '11px', fill: '#aaa', fontFamily: 'monospace'
        }).setOrigin(0,1).setScrollFactor(0).setDepth(12);
        
        bg.setInteractive({ useHandCursor: true });
        bg.on('pointerdown', (pointer, localX, localY, event) => {
            if (!menuOpen) return;
            const item = hotbar[i];
            if (item && item.type) {
                startDrag('hotbar', i, item);
            }
        });
        hotbarSlots.push({ bg, icon, countTxt, index: i });
    }

    hotbarFrame = this.add.rectangle(startX + slotW/2, startY + slotH/2, slotW+6, slotH+6, 0xffffff, 0)
        .setScrollFactor(0).setDepth(13);
    hotbarFrame.setStrokeStyle(3, 0xffcc44);
}

function updateHotbarUI() {
    for (let i = 0; i < hotbarSlots.length; i++) {
        let slot = hotbarSlots[i];
        let item = hotbar[i];
        if (item && item.type && item.count > 0) {
            slot.icon.setText(getItemIcon(item.type));
            slot.countTxt.setText(item.count > 1 ? item.count : '');
            slot.bg.setFillStyle(0x555555);
        } else {
            slot.icon.setText('');
            slot.countTxt.setText('');
            slot.bg.setFillStyle(0x333333);
        }
    }
    const slotW = 44, pad = 5, startX = 16, startY = 16;
    let fx = startX + selectedSlot * (slotW + pad) + slotW/2;
    let fy = startY + slotW/2;
    hotbarFrame.setPosition(fx, fy);
}

// --------------------------------------------------------------
// INVENTORY SLOTS (direct scene objects)
// --------------------------------------------------------------
function buildInventorySlots() {
    const slotW = 44, pad = 5;
    const startX = 16;
    const hotbarBottom = 16 + 44 + 12;
    const invCols = 10, invRows = 2;

    inventorySlots = [];
    for (let r = 0; r < invRows; r++) {
        for (let c = 0; c < invCols; c++) {
            let idx = r * invCols + c;
            let sx = startX + c * (slotW + pad) + slotW/2;
            let sy = hotbarBottom + 30 + r * (slotW + pad) + slotW/2;
            let slotBg = this.add.rectangle(sx, sy, slotW, slotW, 0x2a2a2a)
                .setScrollFactor(0).setDepth(10);
            slotBg.setStrokeStyle(1, 0x666666);
            let icon = this.add.text(sx, sy, '', { fontSize: '26px' }).setOrigin(0.5)
                .setScrollFactor(0).setDepth(11);
            let countTxt = this.add.text(sx + slotW/2 - 5, sy + slotW/2 - 5, '', {
                fontSize: '12px', fill: '#fff'
            }).setOrigin(1,1).setScrollFactor(0).setDepth(12);

            slotBg.setInteractive({ useHandCursor: true });
            slotBg.on('pointerdown', (pointer, localX, localY, event) => {
                if (!menuOpen) return;
                const item = inventory[idx];
                if (item && item.type) {
                    startDrag('inventory', idx, item);
                }
            });

            inventorySlots.push({ bg: slotBg, icon, countTxt, index: idx });
        }
    }
}

function updateInventoryUI() {
    for (let slot of inventorySlots) {
        let item = inventory[slot.index];
        if (item && item.type && item.count > 0) {
            slot.icon.setText(getItemIcon(item.type));
            slot.countTxt.setText(item.count > 1 ? item.count : '');
            slot.bg.setFillStyle(0x555555);
        } else {
            slot.icon.setText('');
            slot.countTxt.setText('');
            slot.bg.setFillStyle(0x2a2a2a);
        }
    }
}

function getItemIcon(type) {
    const map = {
        'stick': '🌿', 'wood': '🪵', 'stone': '🪨',
        'wooden_axe': '🪓', 'wooden_pickaxe': '⛏️',
        'stone_axe': '🪓', 'stone_pickaxe': '⛏️', 'stone_sword': '⚔️'
    };
    return map[type] || '📦';
}

// --------------------------------------------------------------
// UPDATE LOOP
// --------------------------------------------------------------
function update() {
    if (!player) return;

    player.body.setVelocityX(0);
    let left = this.cursors.left.isDown || this.cursors.leftArrow.isDown;
    let right = this.cursors.right.isDown || this.cursors.rightArrow.isDown;
    if (left) player.body.setVelocityX(-360);
    if (right) player.body.setVelocityX(360);
    if ((this.cursors.jump.isDown || this.cursors.upArrow.isDown) && player.body.touching.down) {
        player.body.setVelocityY(-460);
    }
    player.x = Math.min(Math.max(player.x, 30), worldWidth - 30);

    if (!canAttack) {
        attackTimer--;
        if (attackTimer <= 0) canAttack = true;
    }

    if (!menuOpen && this.input.activePointer.leftButtonDown() && canAttack) {
        let worldPoint = this.cameras.main.getWorldPoint(this.input.activePointer.x, this.input.activePointer.y);
        let distToPlayer = Phaser.Math.Distance.Between(player.x, player.y, worldPoint.x, worldPoint.y);
        if (distToPlayer <= REACH) {
            let tool = hotbar[selectedSlot];
            let isAxe = tool && (tool.type === 'wooden_axe' || tool.type === 'stone_axe');
            let isPick = tool && (tool.type === 'wooden_pickaxe' || tool.type === 'stone_pickaxe');

            if (isAxe) {
                for (let i = 0; i < trees.length; i++) {
                    let tree = trees[i];
                    let d = Phaser.Math.Distance.Between(worldPoint.x, worldPoint.y, tree.x, tree.y);
                    if (d < 42) {
                        canAttack = false;
                        attackTimer = 12;
                        tree.treeHealth--;
                        this.showMessage(`💥 Chop! (${tree.treeHealth}/3)`, 0xffaa66);
                        if (tree.treeHealth <= 0) {
                            let woodAmt = tree.woodAmount;
                            tree.destroy();
                            if (tree.leavesObj) tree.leavesObj.destroy();
                            trees.splice(i,1);
                            addToInventory('wood', woodAmt);
                            this.showMessage(`🪵 +${woodAmt} Wood`, 0xBB8844);
                        }
                        break;
                    }
                }
            }
            else if (isPick) {
                for (let i = 0; i < rocks.length; i++) {
                    let rock = rocks[i];
                    let d = Phaser.Math.Distance.Between(worldPoint.x, worldPoint.y, rock.x, rock.y);
                    if (d < 40) {
                        canAttack = false;
                        attackTimer = 12;
                        rock.rockHealth--;
                        this.showMessage(`⛏️ Mine! (${rock.rockHealth}/5)`, 0xbbaa88);
                        if (rock.rockHealth <= 0) {
                            rock.destroy();
                            rocks.splice(i,1);
                            addToInventory('stone', 3);
                            this.showMessage(`🪨 +3 Stone`, 0xaaaaaa);
                        }
                        break;
                    }
                }
            }
        }
    }

    let targetX = player.x - this.game.config.width/2;
    targetX = Math.min(Math.max(targetX, 0), worldWidth - this.game.config.width);
    this.cameras.main.scrollX = targetX;
}
</script>
