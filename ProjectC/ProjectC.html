<!DOCTYPE html>
<html>
<head>
  <title>Mini Terraria Clone</title>
  <style>
    body { margin: 0; overflow: hidden; background: black; }
    canvas { display: block; }
  </style>
</head>
<body>
<canvas id="game"></canvas>
<script>
// --- CANVAS ---
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// --- GAME STATE ---
let gameState = "menu";

// --- WORLD SETTINGS ---
const TILE_SIZE = 32;
const WORLD_WIDTH = 100;
const WORLD_HEIGHT = 50;
let world = [];
let saplings = [];
let drops = []; // items dropped in world with gravity

// --- PLAYER ---
let player = { x: 200, y: 100, width: 28, height: 28, vx: 0, vy: 0, onGround: false, health: 100 };

// --- INPUT ---
let keys = {};
window.addEventListener("keydown", e => keys[e.key] = true);
window.addEventListener("keyup", e => keys[e.key] = false);

// --- CAMERA ---
let camera = { x: 0, y: 0 };

// --- HOTBAR & ITEMS ---
let hotbar = [
    { id: 1, name: "Wood", qty: 0 },
    { id: 2, name: "Pickaxe", qty: 1 },
    { id: 3, name: "Axe", qty: 1 },
    { id: 4, name: "Acorn", qty: 5 },
    { id: 0, name: "Empty", qty: 0 }
];
let selectedSlot = 0;

// --- START BUTTON ---
let startButton = { x: canvas.width/2 - 100, y: canvas.height/2, w: 200, h: 50 };

// --- MOUSE ---
let mouse = { x:0, y:0 }, mouseDown=false, rightMouseDown=false;
canvas.addEventListener("mousemove", e=>{ mouse.x=e.clientX; mouse.y=e.clientY; });
canvas.addEventListener("mousedown", e=>{ if(e.button===0) mouseDown=true; if(e.button===2) rightMouseDown=true; });
canvas.addEventListener("mouseup", e=>{ if(e.button===0) mouseDown=false; if(e.button===2) rightMouseDown=false; });
canvas.addEventListener("contextmenu", e=>e.preventDefault());

// --- COLLISION ---
function isSolid(x,y){
    if(x<0||x>=WORLD_WIDTH||y<0||y>=WORLD_HEIGHT) return false;
    let t = world[y][x];
    return t!==0 && t!==4; // air and acorn not solid
}

// --- PLAYER SPAWN ---
function spawnPlayer(){
    player.x=200;
    let tx = Math.floor(player.x/TILE_SIZE);
    for(let y=0;y<WORLD_HEIGHT;y++){
        if(isSolid(tx,y)){
            player.y=y*TILE_SIZE-player.height;
            player.vy=0;
            player.onGround=true;
            break;
        }
    }
}

// --- CLOUDS ---
let clouds = [
    {x:100,y:100,speed:0.2},{x:400,y:150,speed:0.3},{x:700,y:80,speed:0.15}
];

// --- WORLD GENERATION ---
function generateTree(x,groundY){
    let trunkHeight=3+Math.floor(Math.random()*3);
    for(let i=0;i<trunkHeight;i++){
        if(groundY-i>=0) world[groundY-i][x]=3; // trunk
    }
    let leafY=groundY-trunkHeight;
    for(let dy=-2;dy<=1;dy++){
        for(let dx=-2;dx<=2;dx++){
            let lx=x+dx, ly=leafY+dy;
            if(lx>=0 && lx<WORLD_WIDTH && ly>=0 && ly<WORLD_HEIGHT && world[ly][lx]===0){
                if(Math.random()<0.7) world[ly][lx]=5; // leaves
            }
        }
    }
}

function generateWorld(){
    world=[]; saplings=[]; drops=[];
    const groundHeight=25;
    for(let y=0;y<WORLD_HEIGHT;y++){
        world[y]=[];
        for(let x=0;x<WORLD_WIDTH;x++){
            let variation=Math.floor(Math.sin(x*0.3)*2);
            if(y>groundHeight+variation) world[y][x]=1; // dirt
            else if(y===groundHeight+variation){
                world[y][x]=2; // grass
                if(Math.random()<0.05) generateTree(x,y);
            } else world[y][x]=0;
        }
    }
}

// --- PLAYER UPDATE ---
function updateGame(){
    // movement
    player.vx = keys["a"]?-3:keys["d"]?3:0;
    if(keys[" "] && player.onGround) player.vy=-10;
    player.vy+=0.5; // gravity

    // horizontal collision
    player.x += player.vx;
    let left=Math.floor(player.x/TILE_SIZE), right=Math.floor((player.x+player.width-1)/TILE_SIZE),
        top=Math.floor(player.y/TILE_SIZE), bottom=Math.floor((player.y+player.height-1)/TILE_SIZE);
    for(let y=top;y<=bottom;y++){
        if(player.vx>0 && isSolid(right,y)) player.x=right*TILE_SIZE-player.width;
        if(player.vx<0 && isSolid(left,y)) player.x=(left+1)*TILE_SIZE;
    }

    // vertical collision
    player.y += player.vy;
    player.onGround=false;
    left=Math.floor(player.x/TILE_SIZE); right=Math.floor((player.x+player.width-1)/TILE_SIZE);
    top=Math.floor(player.y/TILE_SIZE); bottom=Math.floor((player.y+player.height-1)/TILE_SIZE);
    for(let x=left;x<=right;x++){
        if(isSolid(x,bottom)){ player.y=bottom*TILE_SIZE-player.height; player.vy=0; player.onGround=true; }
        if(isSolid(x,top)){ player.y=(top+1)*TILE_SIZE; player.vy=0; }
    }

    // camera
    camera.x = player.x - canvas.width/2;
    camera.y = player.y - canvas.height/2;

    // tool actions
    let mx = Math.floor((mouse.x+camera.x)/TILE_SIZE);
    let my = Math.floor((mouse.y+camera.y)/TILE_SIZE);

    if(mouseDown && world[my] && world[my][mx]!==0){
        let tile = world[my][mx];
        let item = hotbar[selectedSlot];

        if(item.id===3 && tile===3){ // axe
            dropTree(mx,my);
        } else if(item.id===2 && (tile===1||tile===2)){ // pickaxe
            world[my][mx]=0;
            drops.push({x:mx*TILE_SIZE, y:my*TILE_SIZE, id:1, vy:0}); // drop wood/dirt
        }
    }

    // place blocks
    if(rightMouseDown && world[my] && world[my][mx]===0){
        let item = hotbar[selectedSlot];
        if(item.qty>0){
            world[my][mx] = item.id===1?3:0;
            item.qty--;
        }
    }

    // update saplings
    for(let i=saplings.length-1;i>=0;i--){
        let s=saplings[i]; s.timer--;
        if(s.timer<=0){ generateTree(s.x,s.y); saplings.splice(i,1); }
    }

    // drop gravity
    for(let d of drops){
        d.vy += 0.5; // gravity
        let newY = d.y + d.vy;
        let tileBelow = Math.floor((newY + TILE_SIZE)/TILE_SIZE);
        let tileX = Math.floor(d.x/TILE_SIZE);
        if(tileBelow>=WORLD_HEIGHT || isSolid(tileX,tileBelow)){
            d.vy = 0;
            d.y = tileBelow*TILE_SIZE-TILE_SIZE;
        } else d.y = newY;
    }

    // pick up drops
    for(let i=drops.length-1;i>=0;i--){
        let d = drops[i];
        let dx = player.x + player.width/2 - (d.x + TILE_SIZE/2);
        let dy = player.y + player.height/2 - (d.y + TILE_SIZE/2);
        if(Math.sqrt(dx*dx+dy*dy)<TILE_SIZE){
            let inv = hotbar.find(h=>h.id===d.id);
            if(inv) inv.qty++;
            drops.splice(i,1);
        }
    }
}

// --- BREAK WHOLE TREE ---
function dropTree(x,y){
    let stack=[{x,y}];
    while(stack.length>0){
        let t = stack.pop();
        if(world[t.y] && world[t.y][t.x]===3){
            world[t.y][t.x]=0;
            drops.push({x:t.x*TILE_SIZE, y:t.y*TILE_SIZE, id:1, vy:0});
            if(t.y>0) stack.push({x:t.x, y:t.y-1});
        }
        for(let dx=-2;dx<=2;dx++){
            for(let dy=-2;dy<=2;dy++){
                let lx=t.x+dx, ly=t.y+dy;
                if(lx>=0 && lx<WORLD_WIDTH && ly>=0 && ly<WORLD_HEIGHT && world[ly][lx]===5){
                    world[ly][lx]=0;
                    drops.push({x:lx*TILE_SIZE, y:ly*TILE_SIZE, id:1, vy:0});
                }
            }
        }
    }
}

// --- DRAW HELPERS ---
function drawItem(ctx,x,y,id,size){
    ctx.save();
    ctx.translate(x,y);
    switch(id){
        case 1: // Wood
            ctx.fillStyle="#8B4513";
            ctx.fillRect(4,4,size-8,size-8);
            ctx.fillStyle="#A0522D";
            ctx.fillRect(6,6,size-12,size-12);
            break;
        case 2: // Pickaxe
            ctx.fillStyle="gray";
            ctx.fillRect(size/2-3,0,6,size);
            ctx.fillStyle="silver";
            ctx.beginPath();
            ctx.moveTo(0,6); ctx.lineTo(size,0); ctx.lineTo(size,6);
            ctx.fill();
            break;
        case 3: // Axe
            ctx.fillStyle="#654321";
            ctx.fillRect(size/2-2,0,4,size);
            ctx.fillStyle="silver";
            ctx.beginPath();
            ctx.moveTo(size/2-6,0); ctx.lineTo(size/2+6,0); ctx.lineTo(size/2,12);
            ctx.fill();
            break;
        case 4: // Acorn
            ctx.fillStyle="#A0522D";
            ctx.beginPath();
            ctx.arc(size/2,size/2,size/3,0,Math.PI*2);
            ctx.fill();
            ctx.fillStyle="#654321";
            ctx.fillRect(size/2-4,0,8,6);
            break;
    }
    ctx.restore();
}

function drawBackground(){
    let gradient = ctx.createLinearGradient(0,0,0,canvas.height);
    gradient.addColorStop(0,"#87CEEB");
    gradient.addColorStop(1,"#E0F6FF");
    ctx.fillStyle=gradient;
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle="white";
    clouds.forEach(c=>{
        let sx = c.x - camera.x*0.5;
        let sy = c.y - camera.y*0.1;
        ctx.beginPath();
        ctx.arc(sx,sy,20,0,Math.PI*2);
        ctx.arc(sx+25,sy+5,25,0,Math.PI*2);
        ctx.arc(sx+50,sy,20,0,Math.PI*2);
        ctx.fill();
        c.x+=c.speed;
        if(c.x>WORLD_WIDTH*TILE_SIZE) c.x=-100;
    });
}

function drawWorld(){
    for(let y=0;y<WORLD_HEIGHT;y++){
        for(let x=0;x<WORLD_WIDTH;x++){
            let t = world[y][x];
            if(t===1) ctx.fillStyle="#8B4513";
            else if(t===2) ctx.fillStyle="#228B22";
            else if(t===3) ctx.fillStyle="#654321";
            else if(t===5) ctx.fillStyle="#2E8B57";
            else continue;
            ctx.fillRect(x*TILE_SIZE-camera.x, y*TILE_SIZE-camera.y, TILE_SIZE, TILE_SIZE);
        }
    }
    drops.forEach(d=>{
        drawItem(ctx, d.x-camera.x, d.y-camera.y, d.id, TILE_SIZE);
    });
}

function drawPlayer(){
    ctx.fillStyle="red";
    ctx.fillRect(player.x-camera.x, player.y-camera.y, player.width, player.height);
}

function drawUI(){
    ctx.fillStyle="white"; ctx.font="20px Arial";
    ctx.fillText("Health: "+player.health,20,30);
    let size=50;
    let startX = canvas.width/2 - (hotbar.length*size)/2;
    for(let i=0;i<hotbar.length;i++){
        ctx.fillStyle=i===selectedSlot?"yellow":"gray";
        ctx.fillRect(startX+i*size, canvas.height-60, size-5, size-5);
        drawItem(ctx,startX+i*size+2,canvas.height-58,hotbar[i].id,size-6);
        if(hotbar[i].qty>0){
            ctx.fillStyle="white"; ctx.font="16px Arial";
            ctx.fillText(hotbar[i].qty, startX+i*size+30, canvas.height-30);
        }
    }
}

function drawMenu(){
    ctx.fillStyle="#1a1a2e"; ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle="white"; ctx.font="50px Arial";
    ctx.fillText("Mini Terraria", canvas.width/2-180,150);
    ctx.fillStyle="#4CAF50"; ctx.fillRect(startButton.x,startButton.y,startButton.w,startButton.h);
    ctx.fillStyle="white"; ctx.font="25px Arial";
    ctx.fillText("Start Game", startButton.x+30, startButton.y+32);
}

// --- GAME LOOP ---
function gameLoop(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    if(gameState==="menu") drawMenu();
    else if(gameState==="game"){
        updateGame();
        drawBackground();
        drawWorld();
        drawPlayer();
        drawUI();
    }
    requestAnimationFrame(gameLoop);
}
gameLoop();

// --- MENU CLICK ---
canvas.addEventListener("click", e=>{
    if(gameState==="menu"){
        if(e.clientX>=startButton.x && e.clientX<=startButton.x+startButton.w &&
           e.clientY>=startButton.y && e.clientY<=startButton.y+startButton.h){
            generateWorld(); spawnPlayer(); gameState="game";
        }
    }
});

// --- HOTBAR SELECT ---
window.addEventListener("keydown", e=>{
    if(!isNaN(e.key)){
        let num = parseInt(e.key);
        if(num>=1 && num<=hotbar.length) selectedSlot=num-1;
    }
});

// --- PLANT ACORNS ---
canvas.addEventListener("contextmenu", e=>{
    let mx=Math.floor((mouse.x+camera.x)/TILE_SIZE);
    let my=Math.floor((mouse.y+camera.y)/TILE_SIZE);
    let item=hotbar[selectedSlot];
    if(item.id===4 && item.qty>0 && world[my][mx]===0){
        saplings.push({x:mx,y:my,timer:200+Math.floor(Math.random()*200)});
        world[my][mx]=4; item.qty--;
    }
});
</script>
</body>
</html>
